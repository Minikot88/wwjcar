server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  charset utf-8;

  location = /health {
    access_log off;
    add_header Content-Type text/plain;
    return 200 "ok\n";
  }

  # Block hidden and sensitive paths before SPA handling.
  location ~ (^|/)\. {
    return 403;
  }

  location ~* (^|/)(?:\.env|\.htaccess|\.git|\.svn|\.hg)(?:/|$) {
    return 403;
  }

  location ~* \.(?:js|css|woff2?|png|jpg|jpeg|gif|webp|svg|ico)$ {
    try_files $uri =404;
    access_log off;
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  location ~* \.(?:html|xml|txt|webmanifest)$ {
    try_files $uri =404;
    expires 5m;
    add_header Cache-Control "public, max-age=300";
  }

  location /api/ {
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_pass http://host.docker.internal:4000/api/;
  }

  # Admin is a protected client-side app; keep SPA fallback for admin routes only.
  location ^~ /admin {
    try_files $uri $uri/ /index.html;
  }

  # Public pages are prerendered. Unknown public routes must return real 404.
  location / {
    try_files $uri/index.html $uri =404;
  }
}
